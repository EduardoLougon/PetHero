<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetHero - Links</title>
    <meta name="description" content="Acesse todos os links e canais de atendimento da PetHero em um só lugar.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./stylesLinks.css">
</head>
<body>
    <div class="background-pattern"></div>

    <div class="container">
        <header>
            
            <div class="logo-container">
                <img src="./LogoDarkText.svg" alt="PetHero Logo">
            </div>
            <div class="comic-badge">São Francisco - Niterói</div>
            <h1 class="hero-text">O QG que seu <span class="highlight">Herói</span> Precisa!</h1>
            <p class="subtitle">Acesse nossos principais canais abaixo:</p>
        </header>

        <main class="links-container">
            <a href="https://wa.me/5521998837527?text=Ol%C3%A1!%20Gostaria%20de%20salvar%20o%20meu%20dia!!" class="link-card" target="_blank" rel="noopener noreferrer">
                <div class="link-content">
                    <div class="icon-wrapper">
                        <i class="fab fa-whatsapp"></i>
                    </div>
                    <span>Agende no WhatsApp</span>
                </div>
                <div class="link-arrow">
                    <i class="fas fa-arrow-right"></i>
                </div>
            </a>

            <a href="https://pethero-o9qy.onrender.com/" class="link-card" target="_blank" rel="noopener noreferrer">
                <div class="link-content">
                    <div class="icon-wrapper">
                        <i class="fas fa-globe"></i>
                    </div>
                    <span>Conheça Nosso Site</span>
                </div>
                <div class="link-arrow">
                    <i class="fas fa-arrow-right"></i>
                </div>
            </a>

            <a href="https://www.instagram.com/petherooficial/" class="link-card" target="_blank" rel="noopener noreferrer">
                <div class="link-content">
                    <div class="icon-wrapper">
                        <i class="fab fa-instagram"></i>
                    </div>
                    <span>Siga Nosso Instagram</span>
                </div>
                <div class="link-arrow">
                    <i class="fas fa-arrow-right"></i>
                </div>
            </a>
        </main>

        <footer>
            <div class="brand-motto">
                <i class="fas fa-heart"></i> Seu pet. Nosso propósito. <i class="fas fa-heart"></i>
            </div>
            <p>&copy; 2026 PetHero. Todos os direitos reservados.</p>
        </footer>
    </div>

    <script src="./scriptsLinks.js"></script>
</body>
</html>
